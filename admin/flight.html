<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #addFlightBtn{

background:#d4af37;
color:black;
border:none;
padding:12px 20px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;

}

.action-btn{

padding:8px 12px;
margin-right:5px;
border:none;
border-radius:5px;
cursor:pointer;

}

.edit{

background:#2196f3;
color:white;

}

.delete{

background:#f44336;
color:white;

}
/* Modal */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    background:#111827;
    width:500px;
    padding:30px;
    border-radius:12px;
}

.modal-content h2{
    margin-bottom:20px;
}

.modal-content input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    background:#1f2937;
    color:white;
    border:1px solid #374151;
    border-radius:8px;
}

.modal-content button{
    width:100%;
    padding:14px;
    background:#d4af37;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
}

#closeModal{
    float:right;
    cursor:pointer;
    font-size:26px;
}
</style>
<body>
    <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flights Management</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>BLACKCESS</h2>

<ul>

<li onclick="location.href='admin.html'">
<i class="fas fa-chart-line"></i>
Dashboard
</li>

<li class="active">
<i class="fas fa-plane"></i>
Flights
</li>

<li>
<i class="fas fa-ticket"></i>
Bookings
</li>

<li>
<i class="fas fa-users"></i>
Users
</li>

</ul>

</div>

<div class="main">

<header>

<h1>Flight Management</h1>

<button id="logoutBtn">Logout</button>

</header>

<button id="addFlightBtn">
<i class="fas fa-plus"></i>
Add Flight
</button>

<table>

<thead>

<tr>

<th>Flight</th>
<th>Departure</th>
<th>Destination</th>
<th>Price</th>
<th>Seats</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="flightTable">

</tbody>

</table>

</div>
<div id="flightModal" class="modal">

    <div class="modal-content">

        <span id="closeModal">&times;</span>

        <h2>Add Flight</h2>

        <form id="flightForm">

            <input
                type="text"
                id="flightNumber"
                placeholder="Flight Number"
                required>

            <input
                type="text"
                id="departureCity"
                placeholder="Departure City"
                required>

            <input
                type="text"
                id="arrivalCity"
                placeholder="Arrival City"
                required>

            <input
                type="datetime-local"
                id="departureTime"
                required>

            <input
                type="datetime-local"
                id="arrivalTime"
                required>

            <input
                type="number"
                id="price"
                placeholder="Price"
                required>

            <input
                type="number"
                id="seats"
                placeholder="Available Seats"
                required>

            <button type="submit">
                Save Flight
            </button>

        </form>

    </div>

</div>

<script src="../supabaseconfigure.js"></script>
<script src="../auth-helper.js"></script>
<script src="flights.js"></script>

</body>

</html>
</body>
</html>
